<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>広島県内雨量可視＋ | Hiroshima Rainfall Monitor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@500;800&display=swap"
        rel="stylesheet">
    <script type="importmap">
    {
      "imports": {
        "@turf/turf": "https://cdn.jsdelivr.net/npm/@turf/turf@7.2.0/+esm"
      }
    }
    </script>
</head>

<body>
    <div id="map"></div>
    <div id="data-alert" class="overlay center-alert">
        <div class="glass alert-content">
            <span class="alert-icon">⚠️</span>
            <span id="alert-message">24時間分のデータが揃っていないため、最大雨量は表示されません。</span>
        </div>
    </div>

    <div class="overlay top-left">
        <div class="glass main-panel-glass">
            <header class="panel-header-flex">
                <div>
                    <h1>広島県内雨量可視＋</h1>
                    <p id="current-date">2026年3月14日</p>
                </div>
                <button id="toggle-settings" class="btn-icon" title="設定パネルを開閉">⚙️</button>
            </header>
            <div id="settings-body">
                <div class="stats">
                    <div class="stat-item">
                        <label class="label" for="theme-selector">地図テーマ</label>
                        <select id="theme-selector" title="地図テーマを選択">
                            <option value="dark">ダークモード</option>
                            <option value="light">標準表示 (ライト)</option>
                        </select>
                    </div>
                    <div class="stat-item">
                        <label class="label" for="datatype-selector">データ種別</label>
                        <select id="datatype-selector" title="表示するデータを選択">
                            <option value="rainfall">🌧️ 雨量データ</option>
                            <option value="waterlevel">🌊 河川水位データ</option>
                        </select>
                    </div>
                    <div class="stat-item">
                        <label class="label" for="mode-selector">表示モード</label>
                        <select id="mode-selector" title="表示モードを選択">
                            <option value="current">リアルタイム表示 (60分降水量)</option>
                            <option value="max60">期間中最大60分降水量</option>
                            <option value="max24">期間中最大24時間降水量</option>
                            <option value="cumulative">期間中累加雨量 (総雨量)</option>
                        </select>
                    </div>
                    <div class="stat-item date-picker">
                        <label class="label">期間設定</label>
                        <div class="date-inputs">
                            <label for="start-date" class="sr-only">開始日</label>
                            <input type="date" id="start-date" title="開始日" value="2026-03-14">
                            <span>～</span>
                            <label for="end-date" class="sr-only">終了日</label>
                            <input type="date" id="end-date" title="終了日" value="2026-03-14">
                        </div>
                        <button id="update-data" class="btn-small">データ更新</button>
                        <span id="update-status" class="update-status"></span>
                    </div>
                    <div class="stat-item stat-item--row" id="isoline-toggle-container">
                        <label class="label" for="toggle-isolines">等雨量線</label>
                        <label class="toggle-switch">
                            <input type="checkbox" id="toggle-isolines" checked>
                            <span class="toggle-knob"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="overlay bottom-center">
        <div class="controls glass">
            <button id="play-pause">Play</button>
            <div class="timeline-container">
                <input type="range" id="timeline" min="0" max="143" value="143" title="時間軸を選択">
                <div class="time-label" id="time-display">23:50</div>
            </div>
        </div>
    </div>

    <div id="legend-rainfall" class="legend glass">
        <h3>降水量 (mm)</h3>
        <div class="legend-scale">
            <div class="scale-item"><span id="bg-rain-0"></span> 0-1</div>
            <div class="scale-item"><span id="bg-rain-1"></span> 1-10</div>
            <div class="scale-item"><span id="bg-rain-10"></span> 10-20</div>
            <div class="scale-item"><span id="bg-rain-20"></span> 20-30</div>
            <div class="scale-item"><span id="bg-rain-30"></span> 30-50</div>
            <div class="scale-item"><span id="bg-rain-50"></span> 50+</div>
        </div>
    </div>

    <div id="legend-waterlevel" class="legend glass legend-hidden">
        <h3>水位危険度</h3>
        <div class="legend-scale">
            <div class="scale-item"><span id="bg-wl-normal"></span> 平常</div>
            <div class="scale-item"><span id="bg-wl-standby"></span> 水防団待機</div>
            <div class="scale-item"><span id="bg-wl-warning"></span> はん濫注意</div>
            <div class="scale-item"><span id="bg-wl-evacuation"></span> 避難判断</div>
            <div class="scale-item"><span id="bg-wl-danger"></span> はん濫危険</div>
        </div>
    </div>

    <!-- 超過局パネル -->
    <div id="adoption-panel" class="overlay top-right adoption-panel-hidden">
        <div class="glass adoption-glass">
            <div class="panel-header">
                <div class="panel-title-row">
                    <span id="panel-icon" class="panel-icon">🔴</span>
                    <h3 id="adoption-count">超過 0局</h3>
                </div>
                <div id="adoption-criteria-label" class="criteria-label"></div>
                <div class="filter-row">
                    <div id="adoption-city-filter-container" class="city-filter-container">
                        <!-- タグボタンが動的に挿入されます -->
                    </div>
                </div>
                <div class="panel-actions">
                    <button id="export-csv" class="btn-small btn-export">CSV出力</button>
                    <button id="toggle-panel" class="btn-small btn-toggle">▲ 閉じる</button>
                </div>
            </div>
            <div id="panel-body">
                <div class="table-wrap">
                    <table id="adoption-table">
                        <thead>
                            <tr>
                                <th>観測局</th>
                                <th>市区町村</th>
                                <th>雨量</th>
                                <th>記録日時</th>
                            </tr>
                        </thead>
                        <tbody id="adoption-tbody"></tbody>
                    </table>
                </div>
                <p id="adoption-empty" class="adoption-empty-msg">採択基準を超過した観測局はありません</p>
            </div>
        </div>
    </div>

    <!-- グラフモーダル -->
    <div id="chart-modal" class="modal-overlay modal-hidden">
        <div class="glass modal-content">
            <div class="modal-header">
                <h3 id="chart-modal-title">観測局名 (期間)</h3>
                <button id="close-chart-modal" class="btn-icon">×</button>
            </div>
            <div class="chart-container">
                <canvas id="rainfall-chart"></canvas>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="src/main.js"></script>
</body>

</html>
